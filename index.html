<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои графики</title>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
</head>
<body>
    <h1>📈 Прогресс (Общага)</h1>
    <div id="chart" style="height: 500px;"></div>
    <script>
        const SPREADSHEET_ID = "1m0ViL0a2TDaS6vbTGLlv1cuzrLtZaMHLvXdQR2QEMII";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

        fetch(CSV_URL)
            .then(r => r.text())
            .then(csv => {
                const rows = csv.split("\n").slice(1);
                const byDate = {};
                for (let row of rows) {
                    let cols = row.split(",");
                    if (cols.length >= 4 && cols[0] && cols[3]) {
                        let date = cols[0];
                        let points = parseFloat(cols[3].replace(',', '.'));
                        if (cols[1] === "Финансы") points *= 0.0002;
                        byDate[date] = (byDate[date] || 0) + points;
                    }
                }
                const dates = Object.keys(byDate).sort();
                const values = dates.map(d => byDate[d]);
                Plotly.newPlot('chart', [{x: dates, y: values, mode: 'lines+markers'}]);
            });
    </script>
</body>
</html>
