<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои графики — расширенный фильтр</title>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 0;
            margin: 0;
            transition: background 0.3s ease, color 0.2s ease;
            min-height: 100vh;
            width: 100%;
        }
        body.light { background: linear-gradient(135deg, #f0f4fa 0%, #e2eaf5 100%); color: #1a2a3a; }
        body.dark { background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%); color: #eef2f7; }
        body.mint { background: linear-gradient(135deg, #d4e4d7 0%, #bdd4c3 100%); color: #1e3a2f; }
        body.warm { background: linear-gradient(135deg, #fde8cd 0%, #f5d5b3 100%); color: #4a3728; }
        .container {
            max-width: 100%;
            margin: 0;
            padding: 20px 30px;
        }
        .card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            width: 100%;
            transition: background 0.2s;
        }
        body.dark .card { background: rgba(30,40,50,0.92); color: #eef2f7; }
        body.mint .card { background: rgba(240,255,240,0.92); }
        body.warm .card { background: rgba(255,248,240,0.92); }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(120deg, #1a4972, #2c7ab1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
        }
        body.dark h1 {
            background: linear-gradient(120deg, #b0d4ff, #6ea8d4);
            -webkit-background-clip: text;
        }
        .sub {
            border-left: 4px solid #2c7ab1;
            padding-left: 16px;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 16px 24px;
            flex: 1;
            min-width: 150px;
            text-align: center;
            transition: background 0.2s;
        }
        body.dark .stat-card {
            background: rgba(20,30,40,0.7);
            color: #eef2f7;
        }
        .stat-number { font-size: 2.2rem; font-weight: 800; color: #1a5d8f; }
        body.dark .stat-number { color: #8ec8e8; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; opacity: 0.8; }
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .period-group, .theme-group, .category-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        button, select {
            background: #e4ebf3;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        select {
            cursor: pointer;
            background: #e4ebf3;
        }
        button.active { background: #1f6e9e; color: white; }
        .theme-btn { background: #ddd; font-size: 0.75rem; padding: 6px 16px; }
        body.dark button, body.dark select { background: #2a3a48; color: #eef; }
        body.dark button.active { background: #3c8db8; }
        #mainChart { width: 100%; height: 600px; }
        .legend-note { text-align: center; font-size: 0.7rem; margin-top: 15px; opacity: 0.7; }
        footer { text-align: center; font-size: 0.7rem; margin-top: 30px; opacity: 0.6; }
        @media (max-width: 700px) {
            .container { padding: 10px 15px; }
            .card { padding: 15px 20px; }
            .stats-grid { flex-direction: column; }
            #mainChart { height: 450px; }
        }
    </style>
</head>
<body class="light">
<div class="container">
    <div class="card">
        <div class="header-flex">
            <h1>📊 Полная аналитика прогресса</h1>
            <div class="theme-group">
                <button class="theme-btn" data-theme="light">☀️ Светлая</button>
                <button class="theme-btn" data-theme="dark">🌙 Тёмная</button>
                <button class="theme-btn" data-theme="mint">🌿 Мятная</button>
                <button class="theme-btn" data-theme="warm">🔥 Тёплая</button>
            </div>
        </div>
        <div class="sub">Общага + фильтр по категориям и периодам</div>
        <div class="stats-grid" id="statsPanel">
            <div class="stat-card"><div class="stat-number" id="totalPoints">0</div><div class="stat-label">Всего баллов</div></div>
            <div class="stat-card"><div class="stat-number" id="totalDays">0</div><div class="stat-label">Дней активности</div></div>
            <div class="stat-card"><div class="stat-number" id="avgPoints">0</div><div class="stat-label">Средний балл/день</div></div>
            <div class="stat-card"><div class="stat-number" id="bestDay">0</div><div class="stat-label">Лучший день</div></div>
        </div>
    </div>

    <div class="card">
        <div class="controls-row">
            <div class="period-group">
                <button class="period-btn active" data-period="all">📆 Всё время</button>
                <button class="period-btn" data-period="week">🗓️ 7 дней</button>
                <button class="period-btn" data-period="month">🌙 30 дней</button>
            </div>
            <div class="category-selector">
                <select id="categorySelect">
                    <option value="all">📊 Все категории</option>
                </select>
            </div>
        </div>
        <div id="mainChart" style="height: 600px; width: 100%;"></div>
        <div class="legend-note">💡 Нажмите на название категории в легенде, чтобы скрыть/показать линию</div>
    </div>
    <footer>Данные из Google Sheets • обновляются при перезагрузке</footer>
</div>

<script>
    const SPREADSHEET_ID = "1m0ViL0a2TDaS6vbTGLlv1cuzrLtZaMHLvXdQR2QEMII";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

    let allRecords = [];
    let activePeriod = 'all';
    let selectedCategory = 'all';
    let categoryColors = {};
    const colorPalette = ["#4CAF50", "#FF9800", "#9C27B0", "#E91E63", "#00BCD4", "#8BC34A", "#F44336", "#3F51B5", "#FF5722", "#009688"];

    function getAxisColor() {
        return document.body.classList.contains('dark') ? '#eef2f7' : '#1a2a3a';
    }
    function getGridColor() {
        return document.body.classList.contains('dark') ? '#334455' : '#ccccdd';
    }

    function setTheme(theme) {
        document.body.className = theme;
        localStorage.setItem('graph_theme', theme);
        render(); 
    }
    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.addEventListener('click', () => setTheme(btn.dataset.theme));
    });
    const savedTheme = localStorage.getItem('graph_theme');
    if (savedTheme) setTheme(savedTheme);

    async function fetchData() {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const rows = text.split("\n").slice(1);
        allRecords = [];
        for (let row of rows) {
            let cols = row.split(",");
            if (cols.length >= 4 && cols[0] && cols[3]) {
                let points = parseFloat(cols[3].replace(',', '.'));
                if (isNaN(points)) continue;
                let cat = cols[1] || "Другое";
                if (cat === "Финансы") points = points * 0.0002;
                if (cat === "Английский" || cat === "Чтение") cat = "Развитие";
                allRecords.push({ date: cols[0], category: cat, points: points });
            }
        }
    }

    function filterPeriod(data) {
        if (activePeriod === 'all') return data;
        const now = new Date();
        const limit = new Date();
        limit.setDate(now.getDate() - (activePeriod === 'week' ? 7 : 30));
        return data.filter(d => new Date(d.date) >= limit);
    }

    function aggregate(data, filterCat) {
        const byDateCat = new Map();
        for (let rec of data) {
            const date = rec.date;
            const cat = rec.category;
            if (filterCat !== 'all' && cat !== filterCat) continue;
            if (!byDateCat.has(date)) byDateCat.set(date, new Map());
            byDateCat.get(date).set(cat, (byDateCat.get(date).get(cat) || 0) + rec.points);
        }
        const dates = Array.from(byDateCat.keys()).sort();
        const categoriesSet = new Set();
        for (let inner of byDateCat.values()) for (let cat of inner.keys()) categoriesSet.add(cat);
        const categories = Array.from(categoriesSet);
        categories.forEach((cat, idx) => { if (!categoryColors[cat]) categoryColors[cat] = colorPalette[idx % colorPalette.length]; });
        
        const traces = [];
        for (let cat of categories) {
            const y = dates.map(d => byDateCat.get(d).get(cat) || 0);
            traces.push({
                x: dates, y: y, mode: 'lines+markers', name: cat,
                line: { width: 2.5, color: categoryColors[cat] },
                marker: { size: 5 }
            });
        }
        let totalByDate = [];
        if (filterCat === 'all') {
            totalByDate = dates.map(d => {
                let sum = 0;
                for (let cat of categories) sum += byDateCat.get(d).get(cat) || 0;
                return sum;
            });
            traces.unshift({
                x: dates, y: totalByDate, mode: 'lines+markers', name: '📈 Общага (сумма)',
                line: { width: 4, color: '#1c4966', dash: 'solid' },
                marker: { size: 7 }
            });
        } else {
            totalByDate = dates.map(d => byDateCat.get(d).get(filterCat) || 0);
        }
        return { traces, dates, totalByDate, categories };
    }

    function updateStats(dates, totalByDate) {
        const total = totalByDate.reduce((a,b)=>a+b,0);
        const days = dates.length;
        const avg = days ? (total/days).toFixed(1) : 0;
        const best = days ? Math.max(...totalByDate) : 0;
        document.getElementById('totalPoints').innerText = total.toFixed(1);
        document.getElementById('totalDays').innerText = days;
        document.getElementById('avgPoints').innerText = avg;
        document.getElementById('bestDay').innerText = best.toFixed(1);
    }

    function updateCategorySelect(categories) {
        const select = document.getElementById('categorySelect');
        const current = select.value;
        select.innerHTML = '<option value="all">📊 Все категории</option>';
        categories.sort().forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        });
        if (current && [...select.options].some(opt => opt.value === current)) {
            select.value = current;
        } else {
            select.value = 'all';
            selectedCategory = 'all';
        }
    }

    async function render() {
        await fetchData();
        const filtered = filterPeriod(allRecords);
        const allCats = [...new Set(filtered.map(r => r.category))];
        updateCategorySelect(allCats);
        const { traces, dates, totalByDate, categories } = aggregate(filtered, selectedCategory);
        updateStats(dates, totalByDate);
        const layout = {
            title: selectedCategory === 'all' ? 'Прогресс по дням (Общага + все категории)' : `Прогресс по категории: ${selectedCategory}`,
            xaxis: { title: 'Дата', tickangle: 0, gridcolor: getGridColor(), color: getAxisColor() },
            yaxis: { title: 'Баллы', gridcolor: getGridColor(), color: getAxisColor() },
            hovermode: 'closest',
            legend: { orientation: 'h', y: -0.15, font: { color: getAxisColor() } },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            margin: { l: 50, r: 30, t: 60, b: 70 }
        };
        Plotly.newPlot('mainChart', traces, layout, { responsive: true });
    }

    document.querySelectorAll('.period-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activePeriod = btn.dataset.period;
            render();
        });
    });
    document.getElementById('categorySelect').addEventListener('change', (e) => {
        selectedCategory = e.target.value;
        render();
    });
    render();
</script>
</body>
</html>
